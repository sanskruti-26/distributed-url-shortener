events {}

http {
  # Round-robin across instances by default. "least_conn" is an option too —
  # try it and compare if you want a talking point on load balancing strategies.
  upstream app_servers {
    server app1:3000;
    server app2:3000;
    server app3:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://app_servers;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
